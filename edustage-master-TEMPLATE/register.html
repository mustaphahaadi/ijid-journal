<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="icon" href="img/favicon.png" type="image/png" />
    <title>Register - IJID</title>
    <link rel="stylesheet" href="css/bootstrap.css" />
    <link rel="stylesheet" href="css/flaticon.css" />
    <link rel="stylesheet" href="css/themify-icons.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/journal.css" />
  </head>
  <body>
    <!--================ Header =================-->
    <header class="header_area">
      <div class="main_menu">
        <nav class="navbar navbar-expand-lg navbar-light">
          <div class="container">
            <a class="navbar-brand logo_h" href="index.html">
              <strong style="font-size:24px;color:var(--ijid-primary);">IJID</strong>
            </a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent">
              <span class="icon-bar"></span><span class="icon-bar"></span><span class="icon-bar"></span>
            </button>
            <div class="collapse navbar-collapse offset" id="navbarSupportedContent">
              <ul class="nav navbar-nav menu_nav ml-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="browse-papers.html">Browse Papers</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
              </ul>
            </div>
          </div>
        </nav>
      </div>
    </header>

    <!--================ Register Section =================-->
    <section class="auth-section">
      <div class="container">
        <div class="auth-card" style="max-width:520px;">
          <div class="auth-header">
            <h3>Create Account</h3>
            <p>Join IJID and start publishing your research</p>
          </div>

          <!-- Role Selection -->
          <div class="role-selector" id="roleSelector">
            <div class="role-option active" data-role="author">
              <i class="ti-pencil-alt"></i>
              Author
            </div>
            <div class="role-option" data-role="reviewer">
              <i class="ti-search"></i>
              Reviewer
            </div>
            <div class="role-option" data-role="reader">
              <i class="ti-book"></i>
              Reader
            </div>
          </div>

          <form id="registerForm">
            <input type="hidden" id="selectedRole" value="author" />
            <div class="row">
              <div class="col-md-6">
                <div class="form-group">
                  <label for="firstName">First Name</label>
                  <input type="text" class="form-control" id="firstName" placeholder="John" required />
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group">
                  <label for="lastName">Last Name</label>
                  <input type="text" class="form-control" id="lastName" placeholder="Doe" required />
                </div>
              </div>
            </div>
            <div class="form-group">
              <label for="email">Email Address</label>
              <input type="email" class="form-control" id="email" placeholder="you@university.edu" required />
            </div>
            <div class="form-group">
              <label for="institution">Institution / Affiliation</label>
              <input type="text" class="form-control" id="institution" placeholder="University of Example" />
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" class="form-control" id="password" placeholder="Min 8 characters" required minlength="8" />
            </div>
            <div class="form-group">
              <label for="confirmPassword">Confirm Password</label>
              <input type="password" class="form-control" id="confirmPassword" placeholder="Repeat password" required />
            </div>
            <div class="form-check mb-3">
              <input type="checkbox" class="form-check-input" id="terms" required />
              <label class="form-check-label" for="terms" style="font-size:13px;">
                I agree to the <a href="#" style="color:var(--ijid-secondary);">Terms of Service</a> and <a href="#" style="color:var(--ijid-secondary);">Privacy Policy</a>
              </label>
            </div>
            <button type="submit" class="btn-journal">Create Account</button>
          </form>

          <div class="auth-divider">
            <span>or sign up with</span>
          </div>

          <button class="btn-google" type="button">
            <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
            Sign up with Google
          </button>

          <div class="auth-footer">
            Already have an account? <a href="login.html">Sign in</a>
          </div>
        </div>
      </div>
    </section>

    <script src="js/jquery-3.2.1.min.js"></script>
    <script src="js/popper.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/journal.js"></script>
  </body>
</html>
